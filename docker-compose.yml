services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic-backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      # You can add other environment variables here from your .env file
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - .:/app
      # Mount Google Cloud Credentials if needed
      # - ./credentials.json:/app/credentials.json
    # IPC host is needed for some Playwright operations in Docker
    ipc: host
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentic-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: always
